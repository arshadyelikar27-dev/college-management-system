<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register Admission | CollegeHub</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="js/theme.js"></script>
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 4rem 2rem;
        }
        .register-card {
            width: 100%;
            max-width: 550px;
            padding: 3rem;
            position: relative;
        }
        .theme-toggle-top {
            position: fixed;
            top: 2rem;
            right: 2rem;
        }
    </style>
</head>
<body>
    <div class="theme-toggle-top">
        <button class="theme-toggle" onclick="toggleTheme()" title="Toggle Theme">
            <i class="fas fa-sun"></i>
        </button>
    </div>
    <div class="glass-card register-card reveal">
        <div style="text-align: center; margin-bottom: 2.5rem;">
            <a href="/" class="logo" style="justify-content: center; margin-bottom: 1rem; font-size: 2rem;">
                <i class="fas fa-graduation-cap"></i>
                CollegeHub
            </a>
            <h2 style="font-size: 1.5rem; color: var(--text-primary);">New Admission</h2>
            <p style="color: var(--text-secondary); margin-top: 0.5rem;">Join our community and start your journey.</p>
        </div>

        <form id="registerForm">
            <div class="form-group">
                <label class="form-label" for="name">Full Name</label>
                <div style="position: relative;">
                    <i class="fas fa-user" style="position: absolute; left: 1rem; top: 1rem; color: var(--text-muted);"></i>
                    <input type="text" id="name" class="form-input" required placeholder="John Doe" style="padding-left: 3rem;">
                </div>
            </div>

            <div class="form-group">
                <label class="form-label" for="email">Email Address</label>
                <div style="position: relative;">
                    <i class="fas fa-envelope" style="position: absolute; left: 1rem; top: 1rem; color: var(--text-muted);"></i>
                    <input type="email" id="email" class="form-input" required placeholder="john@example.com" style="padding-left: 3rem;">
                </div>
            </div>
            
            <div class="form-group">
                <label class="form-label" for="password">Choose Password</label>
                <div style="position: relative;">
                    <i class="fas fa-lock" style="position: absolute; left: 1rem; top: 1rem; color: var(--text-muted);"></i>
                    <input type="password" id="password" class="form-input" required placeholder="••••••••" style="padding-left: 3rem;">
                </div>
            </div>

            <div id="error-message" style="background: rgba(239, 68, 68, 0.1); color: var(--danger); padding: 0.75rem; border-radius: var(--radius-sm); font-size: 0.875rem; margin-bottom: 1.5rem; display: none; border-left: 4px solid var(--danger);"></div>
            <div id="success-message" style="background: rgba(16, 185, 129, 0.1); color: var(--success); padding: 0.75rem; border-radius: var(--radius-sm); font-size: 0.875rem; margin-bottom: 1.5rem; display: none; border-left: 4px solid var(--success);"></div>

            <button type="submit" class="btn btn-primary w-full" id="submitBtn" style="height: 50px;">
                Create Account <i class="fas fa-user-plus"></i>
            </button>
        </form>

        <div style="text-align: center; margin-top: 2rem; font-size: 0.9375rem; color: var(--text-secondary);">
            Already have an account? <a href="login.html" class="text-gradient" style="font-weight: 700;">Sign In Instead</a>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script>
        const registerForm = document.getElementById('registerForm');
        const errorMessage = document.getElementById('error-message');
        const successMessage = document.getElementById('success-message');
        const submitBtn = document.getElementById('submitBtn');

        registerForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const name = document.getElementById('name').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            
            errorMessage.style.display = 'none';
            successMessage.style.display = 'none';
            submitBtn.innerHTML = '<i class="fas fa-circle-notch fa-spin"></i> Processing...';
            submitBtn.disabled = true;

            try {
                await AuthService.register({ name, email, password });
                successMessage.textContent = 'Account created! Redirecting to login...';
                successMessage.style.display = 'block';
                setTimeout(() => {
                    window.location.href = 'login.html';
                }, 2000);
            } catch (error) {
                errorMessage.textContent = error.message;
                errorMessage.style.display = 'block';
                submitBtn.innerHTML = 'Create Account <i class="fas fa-user-plus"></i>';
                submitBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
