<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password | CollegeHub</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="js/theme.js"></script>
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 2rem;
        }
        .login-card {
            width: 100%;
            max-width: 450px;
            padding: 3rem;
            position: relative;
        }
        .theme-toggle-top {
            position: fixed;
            top: 2rem;
            right: 2rem;
        }
    </style>
</head>
<body>
    <div class="theme-toggle-top">
        <button class="theme-toggle" onclick="toggleTheme()" title="Toggle Theme">
            <i class="fas fa-sun"></i>
        </button>
    </div>
    <div class="glass-card login-card reveal">
        <div style="text-align: center; margin-bottom: 2.5rem;">
            <a href="/" class="logo" style="justify-content: center; margin-bottom: 1rem; font-size: 2rem;">
                <i class="fas fa-graduation-cap"></i>
                CollegeHub
            </a>
            <h2 style="font-size: 1.5rem; color: var(--text-primary);">Reset Password</h2>
            <p style="color: var(--text-secondary); margin-top: 0.5rem;" id="stepDescription">Enter your email to receive an OTP.</p>
        </div>

        <div id="error-message" style="background: rgba(239, 68, 68, 0.1); color: var(--danger); padding: 0.75rem; border-radius: var(--radius-sm); font-size: 0.875rem; margin-bottom: 1.5rem; display: none; border-left: 4px solid var(--danger);"></div>
        <div id="success-message" style="background: rgba(16, 185, 129, 0.1); color: var(--success); padding: 0.75rem; border-radius: var(--radius-sm); font-size: 0.875rem; margin-bottom: 1.5rem; display: none; border-left: 4px solid var(--success);"></div>

        <form id="emailForm">
            <div class="form-group">
                <label class="form-label">Email Address</label>
                <div style="position: relative;">
                    <i class="fas fa-envelope" style="position: absolute; left: 1rem; top: 1rem; color: var(--text-muted);"></i>
                    <input type="email" id="emailInput" class="form-input" required placeholder="name@college.com" style="padding-left: 3rem;">
                </div>
            </div>
            <button type="submit" class="btn btn-primary w-full" id="emailBtn" style="height: 50px;">
                Send OTP <i class="fas fa-paper-plane"></i>
            </button>
        </form>

        <form id="otpForm" style="display: none;">
            <div class="form-group">
                <label class="form-label">Enter 6-digit OTP</label>
                <div style="position: relative;">
                    <i class="fas fa-key" style="position: absolute; left: 1rem; top: 1rem; color: var(--text-muted);"></i>
                    <input type="text" id="otpInput" class="form-input" required placeholder="123456" maxlength="6" style="padding-left: 3rem; letter-spacing: 0.2em; font-weight: bold; text-align: center;">
                </div>
            </div>
            <button type="submit" class="btn btn-secondary w-full" id="otpBtn" style="height: 50px;">
                Verify OTP <i class="fas fa-check-circle"></i>
            </button>
        </form>

        <form id="resetForm" style="display: none;">
            <div class="form-group">
                <label class="form-label">New Password</label>
                <div style="position: relative;">
                    <i class="fas fa-lock" style="position: absolute; left: 1rem; top: 1rem; color: var(--text-muted);"></i>
                    <input type="password" id="newPasswordInput" class="form-input" required placeholder="••••••••" style="padding-left: 3rem; padding-right: 3rem;">
                    <i class="fas fa-eye" id="toggleNewPassword" style="position: absolute; right: 1rem; top: 1rem; color: var(--text-muted); cursor: pointer;" onclick="togglePasswordVisibility('newPasswordInput', 'toggleNewPassword')"></i>
                </div>
            </div>
            <button type="submit" class="btn btn-primary w-full" id="resetBtn" style="height: 50px;">
                Reset Password <i class="fas fa-save"></i>
            </button>
        </form>

        <div style="text-align: center; margin-top: 2rem; font-size: 0.9375rem; color: var(--text-secondary);">
            Remembered your password? <a href="login.html" class="text-gradient" style="font-weight: 700;">Sign In</a>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script>
        function togglePasswordVisibility(inputId, iconId) {
            const input = document.getElementById(inputId);
            const icon = document.getElementById(iconId);
            if (input.type === 'password') {
                input.type = 'text';
                icon.classList.remove('fa-eye');
                icon.classList.add('fa-eye-slash');
            } else {
                input.type = 'password';
                icon.classList.remove('fa-eye-slash');
                icon.classList.add('fa-eye');
            }
        }

        const emailForm = document.getElementById('emailForm');
        const otpForm = document.getElementById('otpForm');
        const resetForm = document.getElementById('resetForm');
        
        const errorMessage = document.getElementById('error-message');
        const successMessage = document.getElementById('success-message');
        
        let storedEmail = "";
        let storedOtp = "";

        emailForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('emailBtn');
            storedEmail = document.getElementById('emailInput').value;
            
            errorMessage.style.display = 'none';
            successMessage.style.display = 'none';
            btn.innerHTML = '<i class="fas fa-circle-notch fa-spin"></i> Sending...';
            btn.disabled = true;

            try {
                const res = await Api.post('/auth/forgot-password', { email: storedEmail });
                successMessage.textContent = res.message;
                successMessage.style.display = 'block';
                
                emailForm.style.display = 'none';
                otpForm.style.display = 'block';
                document.getElementById('stepDescription').textContent = "Enter the OTP sent to your email.";
            } catch (error) {
                errorMessage.textContent = error.message;
                errorMessage.style.display = 'block';
            } finally {
                btn.innerHTML = 'Send OTP <i class="fas fa-paper-plane"></i>';
                btn.disabled = false;
            }
        });

        otpForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('otpBtn');
            storedOtp = document.getElementById('otpInput').value;
            
            errorMessage.style.display = 'none';
            successMessage.style.display = 'none';
            btn.innerHTML = '<i class="fas fa-circle-notch fa-spin"></i> Verifying...';
            btn.disabled = true;

            try {
                const res = await Api.post('/auth/verify-otp', { email: storedEmail, otp: storedOtp });
                successMessage.textContent = res.message;
                successMessage.style.display = 'block';
                
                otpForm.style.display = 'none';
                resetForm.style.display = 'block';
                document.getElementById('stepDescription').textContent = "Securely enter your new password.";
            } catch (error) {
                errorMessage.textContent = error.message;
                errorMessage.style.display = 'block';
            } finally {
                btn.innerHTML = 'Verify OTP <i class="fas fa-check-circle"></i>';
                btn.disabled = false;
            }
        });

        resetForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('resetBtn');
            const newPassword = document.getElementById('newPasswordInput').value;
            
            errorMessage.style.display = 'none';
            successMessage.style.display = 'none';
            btn.innerHTML = '<i class="fas fa-circle-notch fa-spin"></i> Resetting...';
            btn.disabled = true;

            try {
                const res = await Api.post('/auth/reset-password', { email: storedEmail, otp: storedOtp, newPassword });
                successMessage.textContent = res.message + " Redirecting to login...";
                successMessage.style.display = 'block';
                setTimeout(() => {
                    window.location.href = 'login.html';
                }, 2000);
            } catch (error) {
                errorMessage.textContent = error.message;
                errorMessage.style.display = 'block';
                btn.innerHTML = 'Reset Password <i class="fas fa-save"></i>';
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
