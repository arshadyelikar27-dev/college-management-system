<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | CollegeHub</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="js/theme.js"></script>
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 2rem;
        }
        .login-card {
            width: 100%;
            max-width: 450px;
            padding: 3rem;
            position: relative;
        }
        .login-card::after {
            content: '';
            position: absolute;
            inset: -2px;
            background: linear-gradient(135deg, var(--primary), var(--secondary), var(--accent));
            border-radius: var(--radius-lg);
            z-index: -1;
            opacity: 0.3;
        }
        .theme-toggle-top {
            position: fixed;
            top: 2rem;
            right: 2rem;
        }
    </style>
</head>
<body>
    <div class="theme-toggle-top">
        <button class="theme-toggle" onclick="toggleTheme()" title="Toggle Theme">
            <i class="fas fa-sun"></i>
        </button>
    </div>
    <div class="glass-card login-card reveal">
        <div style="text-align: center; margin-bottom: 2.5rem;">
            <a href="/" class="logo" style="justify-content: center; margin-bottom: 1rem; font-size: 2rem;">
                <i class="fas fa-graduation-cap"></i>
                CollegeHub
            </a>
            <h2 style="font-size: 1.5rem; color: var(--text-primary);">Secure Login</h2>
            <p style="color: var(--text-secondary); margin-top: 0.5rem;">Welcome back to the portal.</p>
        </div>

        <form id="loginForm">
            <div class="form-group">
                <label class="form-label" for="email">Email Address</label>
                <div style="position: relative;">
                    <i class="fas fa-envelope" style="position: absolute; left: 1rem; top: 1rem; color: var(--text-muted);"></i>
                    <input type="email" id="email" class="form-input" required placeholder="name@college.com" style="padding-left: 3rem;">
                </div>
            </div>
            
            <div class="form-group">
                <label class="form-label" for="password">Password</label>
                <div style="position: relative;">
                    <i class="fas fa-lock" style="position: absolute; left: 1rem; top: 1rem; color: var(--text-muted);"></i>
                    <input type="password" id="password" class="form-input" required placeholder="••••••••" style="padding-left: 3rem;">
                </div>
            </div>

            <div id="error-message" style="background: rgba(239, 68, 68, 0.1); color: var(--danger); padding: 0.75rem; border-radius: var(--radius-sm); font-size: 0.875rem; margin-bottom: 1.5rem; display: none; border-left: 4px solid var(--danger);"></div>

            <button type="submit" class="btn btn-primary w-full" id="submitBtn" style="height: 50px;">
                Sign In <i class="fas fa-sign-in-alt"></i>
            </button>
        </form>

        <div style="text-align: center; margin-top: 2rem; font-size: 0.9375rem; color: var(--text-secondary);">
            New student? <a href="register.html" class="text-gradient" style="font-weight: 700;">Apply for Admission</a>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script>
        const loginForm = document.getElementById('loginForm');
        const errorMessage = document.getElementById('error-message');
        const submitBtn = document.getElementById('submitBtn');

        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            
            errorMessage.style.display = 'none';
            submitBtn.innerHTML = '<i class="fas fa-circle-notch fa-spin"></i> Processing...';
            submitBtn.disabled = true;

            try {
                const user = await AuthService.login(email, password);
                if (user) {
                    if (user.role === 'admin') {
                        window.location.href = 'admin-dashboard.html';
                    } else {
                        window.location.href = 'student-dashboard.html';
                    }
                }
            } catch (error) {
                errorMessage.textContent = error.message;
                errorMessage.style.display = 'block';
                submitBtn.innerHTML = 'Sign In <i class="fas fa-sign-in-alt"></i>';
                submitBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
